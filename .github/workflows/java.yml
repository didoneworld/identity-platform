name: Java runtime build

on:
  push:
    branches: [main]
    paths:
      - 'pom.xml'
      - 'src/main/java/**'
      - '.github/workflows/java.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Eclipse Temurin Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Java Unifile
        run: mvn -B clean package

      - name: Upload shaded JAR
        uses: actions/upload-artifact@v4
        with:
          name: didone-identity-platform-jar
          path: target/identity-platform-0.1.0.jar

  publish-image:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Eclipse Temurin Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and publish Kubernetes image without Docker
        run: |
          mvn -B compile jib:build \
            -Djib.to.image=ghcr.io/didoneworld/identity-platform:${{ github.sha }} \
            -Djib.to.tags=latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}
