apiVersion: apps/v1
kind: Deployment
metadata:
  name: didone-identity-platform
  namespace: didone-identity
  labels:
    app.kubernetes.io/name: didone-identity-platform
    app.kubernetes.io/component: identity-runtime
    app.kubernetes.io/part-of: didone-world
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: didone-identity-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: didone-identity-platform
        app.kubernetes.io/component: identity-runtime
        app.kubernetes.io/part-of: didone-world
    spec:
      containers:
        - name: identity-platform
          image: ghcr.io/didoneworld/identity-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
